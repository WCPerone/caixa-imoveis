name: Daily scrape

on:
  schedule:
    # 11:00 UTC = 08:00 Brasília (UTC-3, no DST)
    - cron: "0 11 * * 1-5"
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write           # needed to commit data back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Download today's lists
        run: python scraper.py

      - name: Update history DB
        run: python update_history.py

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
